<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Favicon & PWA Icons ─── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ─── PWA Manifest ─── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── PWA / Mobile App Tags ─── -->
    <meta name="theme-color" content="#D4AF37" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WonderOne" />
    <meta name="application-name" content="WonderOne" />
    <meta name="msapplication-TileColor" content="#0B0415" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- ─── SEO Base (overridden per-page by SeoManager / SEO component) ─── -->
    <meta name="robots" content="index, follow" data-seo="robots" />
    <meta
      name="description"
      content="A WonderOne Surprise is a luxury private event studio in Chennai for romantic celebrations, birthdays, and surprise experiences with curated packages."
      data-seo="description"
    />
    <meta
      name="keywords"
      content="A WonderOne Surprise, private event studio Chennai, luxury event booking Chennai, birthday celebration Chennai, romantic surprise Chennai, private celebration packages"
    />
    <meta name="author" content="A WonderOne Surprise" />

    <!-- ─── Open Graph ─── -->
    <meta property="og:site_name" content="A WonderOne Surprise" />
    <meta property="og:type" content="website" data-seo="og:type" />
    <meta property="og:title" content="A WonderOne Surprise | Luxury Private Event Studio in Chennai" data-seo="og:title" />
    <meta property="og:url" content="https://www.awonderone.com/" data-seo="og:url" />
    <meta
      property="og:description"
      content="Book premium indoor private celebrations in Chennai — romantic experiences, birthdays, and luxury surprises with curated packages and personal add-ons."
      data-seo="og:description"
    />
    <meta property="og:image" content="https://www.awonderone.com/themes/romantic/romantic1.jpg" data-seo="og:image" />
    <meta property="og:image:alt" content="Luxury romantic private event setup at A WonderOne Surprise" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ─── Twitter / X Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A WonderOne Surprise | Luxury Private Event Studio in Chennai" data-seo="twitter:title" />
    <meta
      name="twitter:description"
      content="Plan romantic celebrations, birthdays, and luxury surprise experiences with private event packages in Chennai."
      data-seo="twitter:description"
    />
    <meta name="twitter:image" content="https://www.awonderone.com/themes/romantic/romantic1.jpg" data-seo="twitter:image" />

    <!-- ─── Canonical (set dynamically by SeoManager) ─── -->
    <link rel="canonical" href="https://www.awonderone.com/" data-seo="canonical" />

    <!-- ─── Page Title ─── -->
    <title>A WonderOne Surprise | Luxury Private Event Studio in Chennai</title>

    <!-- ─── Structured Data ─── -->
    <script type="application/ld+json" data-seo="structured-data">
      {
        "@context": "https://schema.org",
        "@type": "EventVenue",
        "name": "A WonderOne Surprise",
        "description": "Premium indoor private event studio in Chennai for romantic celebrations, birthdays, luxury surprises, custom packages, and online booking.",
        "url": "https://www.awonderone.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "No.3, Railway Colony, 1st Street, Aminjikarai, Nelson Manickam Road",
          "addressLocality": "Chennai",
          "postalCode": "600029",
          "addressCountry": "IN"
        },
        "openingHours": "Mo-Su 09:00-23:00",
        "image": "https://www.awonderone.com/themes/romantic/romantic1.jpg",
        "sameAs": []
      }
    </script>

    <!-- ─── Fonts ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"

        rel="stylesheet"
      />
